name: Export dorar/aadab

on:
  workflow_dispatch:
    inputs:
      test_pages:
        description: "عدد صفحات للاختبار (0 = كامل)"
        required: false
        default: "0"

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run export
        env:
          TEST_PAGES: ${{ github.event.inputs.test_pages }}
        run: python dorar_aadab_export.py

      - name: Push output to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "export: aadab $(date +'%Y-%m-%d %H:%M')"
          git push
